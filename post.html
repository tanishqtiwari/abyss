<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post - Tanishq Abyss</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nosifer&family=Creepster&display=swap');

    :root {
      --blood: #ff1a2e;
      --deepred: #a00;
      --void: #0a0000;
    }

    body {
      background: var(--void);
      color: #eee;
      font-family: 'Creepster', sans-serif;
      margin: 0;
      padding: 105px 15px 15px 15px; 
      line-height: 1.5;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    /* --- FIXED NAVBAR HEADER --- */
    .app-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 85px;
      background: #0f0001;
      border-bottom: 3px solid var(--deepred);
      display: grid;
      grid-template-columns: 120px 1fr 120px;
      align-items: center;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(255, 26, 46, 0.25);
      box-sizing: border-box;
      padding: 0 10px;
    }

    .back-btn {
      background: transparent;
      border: 2px solid var(--deepred);
      color: var(--blood);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      font-family: 'Creepster', sans-serif;
      transition: all 0.2s ease;
      text-align: center;
    }
    .back-btn:hover {
      background: var(--blood);
      color: #000;
      box-shadow: 0 0 10px var(--blood);
    }

    .app-header h1 {
      margin: 0;
      font-family: 'Nosifer', cursive;
      font-size: 2.2rem;
      color: var(--blood);
      text-shadow: 3px 3px 0 #000, -3px -3px 0 #000;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1.1;
      text-align: center;
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      .app-header { height: 75px; grid-template-columns: 90px 1fr 90px; }
      .app-header h1 { font-size: 1.4rem; letter-spacing: 1px; }
      .back-btn { font-size: 0.85rem; padding: 4px 8px; }
      body { padding-top: 95px; }
    }

    .box {
      background: #140000;
      border: 3px solid var(--deepred);
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(255, 26, 46, 0.3);
    }

    .main-post .username {
      color: #ff5555;
      font-size: 1.45rem;
      margin-bottom: 5px;
      text-shadow: 0 0 8px var(--blood);
    }

    .post-content p {
      word-break: break-word;
      overflow-wrap: break-word;
      margin: 12px 0;
      font-size: 1.2rem;
    }

    img, video {
      max-width: 100%;
      border-radius: 8px;
      border: 2px solid #660000;
      margin: 12px 0;
      display: block;
    }

    textarea {
      width: 100%;
      padding: 15px;
      background: #000;
      color: #ff8888;
      border: 2px solid #660000;
      border-radius: 8px;
      font-family: 'Creepster', sans-serif;
      min-height: 80px;
      box-sizing: border-box;
      margin-top: 10px;
      font-size: 1.1rem;
    }

    input[type="file"] {
      background: #000;
      color: #ff8888;
      border: 2px dashed #440000;
      padding: 10px;
      border-radius: 8px;
      width: 100%;
      box-sizing: border-box;
      margin-top: 10px;
      font-family: 'Creepster', sans-serif;
    }

    button {
      padding: 10px 18px;
      background: #220000;
      color: #ffbbbb;
      border: 2px solid var(--blood);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Creepster', sans-serif;
      margin-top: 10px;
      font-size: 1.05rem;
      transition: all 0.2s;
    }
    button:hover:not(:disabled) {
      background: var(--blood);
      color: #000;
      box-shadow: 0 0 15px var(--blood);
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* --- TIMESTAMPS --- */
    .timestamp-label {
      font-size: 0.85rem;
      color: #883333;
      font-family: system-ui, -apple-system, sans-serif;
      margin-bottom: 6px;
    }

    /* --- COMMENTS ARCHITECTURE --- */
    .comment {
      background: #110000;
      border: 2px solid #550000;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .comment .username {
      color: #ff7777;
      font-size: 1.25rem;
      text-shadow: 0 0 6px var(--blood);
    }

    .comment p {
      word-break: break-word;
      overflow-wrap: break-word;
      margin: 8px 0;
      font-size: 1.1rem;
    }

    .comment-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .reactions-cluster {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .react-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px dashed #660000;
      color: #ff8888;
      padding: 3px 8px;
      font-size: 0.95rem;
      margin: 0;
      border-radius: 6px;
    }
    .react-pill:hover {
      background: #220000;
    }

    .action-links {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .action-text-btn {
      color: #ff5555;
      font-size: 1rem;
      cursor: pointer;
      user-select: none;
    }
    .action-text-btn:hover {
      text-shadow: 0 0 5px var(--blood);
    }

    .delete-btn {
      background: #400000;
      color: #ffaaaa;
      border-color: #800000;
      padding: 3px 8px;
      font-size: 0.85rem;
      margin: 0;
    }

    /* --- INLINE REPLY FORM --- */
    .reply-form-container {
      display: none;
      margin-top: 12px;
      border-left: 2px solid var(--blood);
      padding-left: 12px;
    }

    /* --- NESTING & INSTAGRAM ALIGNMENTS --- */
    .replies-branch {
      margin-left: 25px;
      border-left: 2px dashed #440000;
      padding-left: 12px;
    }

    .author-highlight {
      border-left: 3px solid #ffaa00 !important;
      background: #1f0507;
    }
    .author-badge {
      background: #ffaa00;
      color: #000;
      font-size: 0.75rem;
      font-family: system-ui, sans-serif;
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
      font-weight: bold;
    }

    /* --- THREAD ACCORDIANS --- */
    .thread-toggle-wrapper {
      margin-left: 25px;
      margin-top: 10px;
    }
    .thread-toggle-btn {
      background: transparent;
      border: none;
      color: #ff8888;
      font-size: 1rem;
      cursor: pointer;
      padding: 0;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .thread-toggle-btn:hover {
      color: var(--blood);
    }

    .thread-content-block {
      display: none;
    }

    .posting-loader {
      display: none;
      align-items: center;
      gap: 12px;
      color: #ff6666;
      font-size: 1.1rem;
      margin-top: 10px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 4px solid #440000;
      border-top: 4px solid var(--blood);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header class="app-header">
  <button class="back-btn" onclick="goBack()">← BACK</button>
  <h1>THE ABYSS</h1>
  <div></div> 
</header>

<div class="container">

  <div id="mainPost" class="box">
    <p style="text-align:center; color:#555;">Summoning core post payload matrix...</p>
  </div>

  <div class="box">
    <b>ADD WHISPER COMMENT</b>
    <textarea id="commentInput" placeholder="Write your whisper into the dark..."></textarea>
    <input type="file" id="commentFile" accept="image/*,video/*">
    <button id="commentBtn" onclick="addComment('', 'primary')">POST COMMENT</button>
    
    <div id="postingLoader" class="posting-loader">
      <div class="spinner"></div>
      <span>Bleeding into the void...</span>
    </div>
  </div>

  <div id="comments"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_rZQ0-PTcw2u--0AjybYOBtWnoh2XxDk",
  authDomain: "counter-ea7c8.firebaseapp.com",
  projectId: "counter-ea7c8",
  storageBucket: "counter-ea7c8.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);
const auth = getAuth(app);

const postId = new URLSearchParams(location.search).get("id");
if (!postId) {
  document.body.innerHTML = "<h2 style='color:red;text-align:center;margin-top:120px;'>No context reference target context found</h2>";
}

let currentUser = null;
let currentUsername = "Anonymous";
let parentPostOwnerId = ""; 

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  currentUsername = localStorage.getItem("username") || "Anonymous";
  window.renderCommentsTree();
});

window.goBack = () => {
  if (document.referrer && document.referrer.includes(window.location.hostname)) {
    history.back();
  } else {
    location.href = "index.html";
  }
};

function getUsername() { return currentUsername; }

function showCommentLoader(show) {
  const loader = document.getElementById("postingLoader");
  const btn = document.getElementById("commentBtn");
  if (loader && btn) {
    loader.style.display = show ? "flex" : "none";
    btn.disabled = show;
  }
}

function parseFormattedDate(timestampMillis) {
  if (!timestampMillis) return "";
  const dateObj = new Date(timestampMillis);
  return dateObj.toLocaleString(undefined, {
    month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
  });
}

// Memory Cache maps 
let commentsFlatList = [];
let expandedThreadsState = {}; 

async function loadMainPost() {
  try {
    const postRef = doc(db, "posts", postId);
    const postSnap = await getDoc(postRef);
    
    if (postSnap.exists()) {
      const p = postSnap.data();
      parentPostOwnerId = p.ownerId || ""; 
      
      let media = "";
      if (p.fileType?.startsWith("video")) {
        media = `<video src="${p.fileUrl}" controls></video>`;
      } else if (p.fileUrl) {
        media = `<img src="${p.fileUrl}">`;
      }

      document.getElementById("mainPost").innerHTML = `
        <div class="main-post">
          <div class="username">${p.username}</div>
          <div class="timestamp-label">${parseFormattedDate(p.timestamp)}</div>
          <div class="post-content">
            <p>${p.content || ""}</p>
            ${media}
          </div>
        </div>
      `;
    } else {
      document.getElementById("mainPost").innerHTML = `<p style="color:#aa0000; text-align:center;">Post missing.</p>`;
    }
  } catch (e) {
    console.error(e);
  }
}

loadMainPost();

// Unified entry adding script supporting sub-nest allocation properties
window.addComment = async (parentId = "", executionContext = "primary") => {
  let text, fileInput, loaderElement, postButton;
  
  if (executionContext === 'primary') {
    text = document.getElementById("commentInput").value.trim();
    fileInput = document.getElementById("commentFile");
    showCommentLoader(true);
  } else {
    text = document.getElementById(`replyInput-${parentId}`).value.trim();
    fileInput = document.getElementById(`replyFile-${parentId}`);
    postButton = document.getElementById(`replyBtn-${parentId}`);
    if (postButton) postButton.disabled = true;
  }

  const file = fileInput ? fileInput.files[0] : null;
  let url = "";

  if (file) {
    try {
      const r = ref(storage, `comments/${Date.now()}_${file.name}`);
      await uploadBytes(r, file);
      url = await getDownloadURL(r);
    } catch (e) {
      alert("Storage upload error.");
      if (executionContext === 'primary') showCommentLoader(false);
      if (postButton) postButton.disabled = false;
      return;
    }
  }

  if (!text && !url) {
    alert("Comment structure cannot be blank.");
    if (executionContext === 'primary') showCommentLoader(false);
    if (postButton) postButton.disabled = false;
    return;
  }

  try {
    await addDoc(collection(db, "posts", postId, "comments"), {
      username: getUsername(),
      ownerId: currentUser ? currentUser.uid : "anon",
      text: text,
      image: url,
      parentId: parentId || null, 
      likesMap: {},
      dislikesMap: {},
      timestamp: Date.now()
    });

    if (executionContext === 'primary') {
      document.getElementById("commentInput").value = "";
      document.getElementById("commentFile").value = "";
    } else {
      window.toggleReplyForm(parentId);
    }
  } catch (e) {
    alert("Database connection sync dropped.");
    if (executionContext === 'primary') showCommentLoader(false);
    if (postButton) postButton.disabled = false;
  }
};

window.toggleReplyForm = (commentId) => {
  const form = document.getElementById(`replyForm-${commentId}`);
  if (form) {
    form.style.display = (form.style.display === "block") ? "none" : "block";
  }
};

window.toggleThreadAccordian = (commentId, threadLength) => {
  const contentBlock = document.getElementById(`threadBlock-${commentId}`);
  const triggerBtn = document.getElementById(`threadToggleBtn-${commentId}`);
  
  if (!contentBlock) return;
  
  if (contentBlock.style.display === "block") {
    contentBlock.style.display = "none";
    expandedThreadsState[commentId] = false;
    triggerBtn.textContent = `▶ View ${threadLength} replies`;
  } else {
    contentBlock.style.display = "block";
    expandedThreadsState[commentId] = true;
    
    if (threadLength > 10) {
      triggerBtn.textContent = `▼ Showing first 10 replies (View ${threadLength - 10} more below)`;
    } else {
      triggerBtn.textContent = `▼ Hide replies`;
    }
  }
};

window.handleCommentVote = async (commentId, voteType) => {
  if (!currentUser) return alert("You must choose a presence signature profile first.");
  try {
    const commentDocRef = doc(db, "posts", postId, "comments", commentId);
    const targetSnapshot = commentsFlatList.find(d => d.id === commentId);
    if (!targetSnapshot) return;

    const data = targetSnapshot.data();
    let likesMap = data.likesMap || {};
    let dislikesMap = data.dislikesMap || {};
    const uid = currentUser.uid;

    if (voteType === 'like') {
      if (likesMap[uid]) { delete likesMap[uid]; } else { likesMap[uid] = true; delete dislikesMap[uid]; }
    } else {
      if (dislikesMap[uid]) { delete dislikesMap[uid]; } else { dislikesMap[uid] = true; delete likesMap[uid]; }
    }

    await updateDoc(commentDocRef, { likesMap, dislikesMap });
  } catch (err) {
    console.error("Mutation vector execution error: ", err);
  }
};

window.deleteComment = async (commentId) => {
  if (!confirm("Banish this record completely? All matching sub-threads drop out of scope layout view paths.")) return;
  try {
    await deleteDoc(doc(db, "posts", postId, "comments", commentId));
    // Cascade delete any child components instantly bound locally tracking indices
    const children = commentsFlatList.filter(d => d.data().parentId === commentId);
    for (const child of children) {
      await deleteDoc(doc(db, "posts", postId, "comments", child.id));
    }
  } catch (err) {
    alert("Authorization failure.");
  }
};

// Generates structural template rows
function compileSingleCommentHtml(docObj, isNestedReply = false) {
  const c = docObj.data();
  const id = docObj.id;
  
  let media = c.image ? `<img src="${c.image}">` : "";
  const totalLikes = Object.values(c.likesMap || {}).filter(v => v === true).length;
  const totalDislikes = Object.values(c.dislikesMap || {}).filter(v => v === true).length;

  const isCommentOwner = currentUser && c.ownerId === currentUser.uid;
  const isParentPostOwner = currentUser && parentPostOwnerId && parentPostOwnerId === currentUser.uid;
  
  let deleteBtnMarkup = (isCommentOwner || isParentPostOwner) 
    ? `<button class="delete-btn" onclick="deleteComment('${id}')">ERASE</button>` 
    : "";

  // Check if original author of post
  const isAuthorIdentity = parentPostOwnerId && c.ownerId === parentPostOwnerId;
  const authorBadge = isAuthorIdentity ? `<span class="author-badge">AUTHOR</span>` : "";
  const alignmentClass = isAuthorIdentity ? "author-highlight" : "";

  return `
    <div class="comment ${alignmentClass}" id="commentNode-${id}">
      <div class="comment-header">
        <div>
          <span class="username">${c.username || "Anonymous"}</span>${authorBadge}
          <div class="timestamp-label">${parseFormattedDate(c.timestamp)}</div>
        </div>
        ${deleteBtnMarkup}
      </div>
      <p>${c.text || ""}</p>
      ${media}
      
      <div class="comment-toolbar">
        <div class="reactions-cluster">
          <button class="react-pill" onclick="handleCommentVote('${id}', 'like')">👍 <span>${totalLikes}</span></button>
          <button class="react-pill" onclick="handleCommentVote('${id}', 'dislike')">👎 <span>${totalDislikes}</span></button>
        </div>
        <div class="action-links">
          <span class="action-text-btn" onclick="toggleReplyForm('${id}')">REPLY</span>
        </div>
      </div>

      <div class="reply-form-container" id="replyForm-${id}">
        <textarea id="replyInput-${id}" placeholder="Reply to this thread level..."></textarea>
        <input type="file" id="replyFile-${id}" accept="image/*,video/*" style="font-size:0.85rem; padding:4px;">
        <button id="replyBtn-${id}" onclick="addComment('${id}', 'reply')" style="padding:6px 12px; font-size:0.95rem;">REPLY</button>
      </div>
    </div>
  `;
}

// Tree Parsing Engine
window.renderCommentsTree = () => {
  const container = document.getElementById("comments");
  container.innerHTML = "";

  if (commentsFlatList.length === 0) {
    container.innerHTML = `<div class="box" style="text-align:center; color:#aa0000; margin-top:20px;">No whispers left here yet...</div>`;
    return;
  }

  // Segment top-level roots from sub-replies
  const rootComments = commentsFlatList.filter(d => !d.data().parentId);
  const repliesPool = commentsFlatList.filter(d => d.data().parentId);

  rootComments.forEach(rootDoc => {
    let threadHtml = `<div class="root-comment-thread-block">`;
    threadHtml += compileSingleCommentHtml(rootDoc, false);

    // Filter direct sub-elements matching this identifier route
    const directReplies = repliesPool.filter(r => r.data().parentId === rootDoc.id);

    if (directReplies.length > 0) {
      // Split authors from fan replies for prioritized nesting tracking loops
      const authorReplies = directReplies.filter(r => parentPostOwnerId && r.data().ownerId === parentPostOwnerId);
      const regularReplies = directReplies.filter(r => !parentPostOwnerId || r.data().ownerId !== parentPostOwnerId);

      // Render author responses inline immediately
      authorReplies.forEach(authReply => {
        threadHtml += `<div class="replies-branch">${compileSingleCommentHtml(authReply, true)}</div>`;
      });

      // Render general fan replies behind an interactive accordian thread
      if (regularReplies.length > 0) {
        const totalRegularCount = regularReplies.length;
        const isCurrentlyExpanded = expandedThreadsState[rootDoc.id] || false;
        
        const blockStyle = isCurrentlyExpanded ? "display: block;" : "display: none;";
        const initialText = isCurrentlyExpanded 
          ? (totalRegularCount > 10 ? `▼ Showing first 10 replies (View ${totalRegularCount - 10} more below)` : `▼ Hide replies`)
          : `▶ View ${totalRegularCount} replies`;

        threadHtml += `
          <div class="thread-toggle-wrapper">
            <button id="threadToggleBtn-${rootDoc.id}" class="thread-toggle-btn" onclick="toggleThreadAccordian('${rootDoc.id}', ${totalRegularCount})">
              ${initialText}
            </button>
          </div>
          <div id="threadBlock-${rootDoc.id}" class="thread-content-block" style="${blockStyle}">
        `;

        // Render loop with a localized cutoff threshold at 10 items
        regularReplies.forEach((fanReply, index) => {
          if (index === 10) {
            // Append explicit context indicator markup break line properties
            threadHtml += `
              <div id="extendedCutoffBlock-${rootDoc.id}" class="extended-cutoff-notice" style="padding:10px 0 10px 25px; color:#ffaa55; font-family:system-ui,sans-serif; font-size:0.9rem;">
                📊 View ${totalRegularCount - 10} more replies below...
              </div>
            `;
          }
          threadHtml += `<div class="replies-branch">${compileSingleCommentHtml(fanReply, true)}</div>`;
        });

        threadHtml += `</div>`; // Close accordian block wrapper
      }
    }

    threadHtml += `</div>`; 
    container.innerHTML += threadHtml;
  });
};

const commentsRef = collection(db, "posts", postId, "comments");
const chronologicalCommentsQuery = query(commentsRef, orderBy("timestamp", "asc"));

onSnapshot(chronologicalCommentsQuery, (snap) => {
  commentsFlatList = snap.docs;
  window.renderCommentsTree();
  showCommentLoader(false);
}, (err) => {
  console.error("Pipeline failure: ", err);
});
</script>
</body>
</html>
