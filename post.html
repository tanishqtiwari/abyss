<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abyss Resonance Node</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nosifer&family=Creepster&display=swap');

    :root {
      --blood: #ff1a2e;
      --deepred: #a00;
      --void: #0a0000;
    }

    body {
      background: var(--void);
      color: #eee;
      font-family: 'Creepster', system-ui, sans-serif;
      margin: 0;
      padding: 105px 15px 15px 15px;
      line-height: 1.5;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    /* --- FIXED NAVBAR --- */
    .app-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 85px;
      background: #0f0001;
      border-bottom: 3px solid var(--deepred);
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(255, 26, 46, 0.25);
      box-sizing: border-box;
      padding: 0 10px;
    }

    .nav-back-btn {
      background: transparent;
      border: none;
      color: var(--blood);
      font-size: 1.2rem;
      cursor: pointer;
      font-family: 'Creepster', sans-serif;
      justify-self: center;
    }

    .app-header h1 {
      margin: 0;
      font-family: 'Nosifer', cursive;
      font-size: 2.2rem;
      color: var(--blood);
      text-shadow: 3px 3px 0 #000;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }

    @media (max-width: 768px) {
      .app-header { height: 75px; }
      .app-header h1 { font-size: 1.4rem; }
      body { padding-top: 95px; }
    }

    /* --- CONTENT CORE --- */
    .box {
      background: #140000;
      border: 3px solid var(--deepred);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(255, 26, 46, 0.3);
      margin-bottom: 25px;
    }

    b {
      font-size: 1.2rem;
      letter-spacing: 1px;
      color: #ffaaaa;
      margin-bottom: 10px;
      display: block;
    }

    /* --- MAIN POST BLOCK --- */
    .main-post {
      background: #110000;
      border: 2px solid #660000;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(160, 0, 0, 0.4);
    }

    .post-header-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .username {
      color: #ff5555;
      font-size: 1.4rem;
      text-shadow: 0 0 8px var(--blood);
    }

    .timestamp-label {
      color: #883333;
      font-size: 0.85rem;
      font-family: system-ui, sans-serif;
      margin-top: 2px;
    }

    .post-content p {
      font-size: 1.2rem;
      word-break: break-word;
      margin: 15px 0;
    }

    img, video {
      max-width: 100%;
      max-height: 500px;
      border-radius: 8px;
      border: 2px solid #550000;
      display: block;
      margin: 15px 0;
    }

    /* --- ACTION TOOLBARS --- */
    .comment-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .reactions-cluster {
      display: flex;
      gap: 10px;
    }

    .react-pill {
      background: #220000;
      color: #ffbbbb;
      border: 2px solid var(--blood);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Creepster', sans-serif;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .react-pill:hover {
      background: var(--blood);
      color: #000;
      box-shadow: 0 0 15px #ff1a2e;
    }

    .action-links {
      display: flex;
      gap: 15px;
    }

    .action-text-btn {
      color: #ff8888;
      cursor: pointer;
      font-size: 1.05rem;
      user-select: none;
    }
    .action-text-btn:hover { color: var(--blood); }

    .author-controls {
      display: flex;
      gap: 8px;
    }

    .author-action-btn {
      background: #220000;
      border: 1px solid #aa0000;
      color: #ffaaaa;
      padding: 4px 8px;
      font-size: 0.85rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Creepster', sans-serif;
    }
    .author-action-btn:hover { background: #440000; }
    .author-action-btn.delete-btn { border-color: var(--blood); color: var(--blood); }
    .author-action-btn.delete-btn:hover { background: #330000; }

    /* --- INPUT FIELD WITH EMBEDDED MEDIA ACCESS --- */
    .input-container-wrapper {
      position: relative;
      width: 100%;
      margin-top: 8px;
    }

    .input-container-wrapper textarea {
      width: 100%;
      padding: 12px 55px 12px 12px; 
      background: #000;
      color: #ff8888;
      border: 2px solid #560000;
      border-radius: 8px;
      box-sizing: border-box;
      font-family: 'Creepster', sans-serif;
      font-size: 1.05rem;
      min-height: 80px;
      resize: vertical;
      margin: 0;
    }

    /* BOUNDED BUTTON FOR MEDIA CAPTURES */
    .media-attach-trigger {
      position: absolute;
      right: 12px;
      top: 12px;
      width: 32px;
      height: 32px;
      background: #110000;
      border: 1.5px solid #560000;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      transition: all 0.2s ease-in-out;
    }
    
    .media-attach-trigger svg {
      width: 18px;
      height: 18px;
      fill: #ffaa55;
      transition: fill 0.2s;
    }

    .media-attach-trigger:hover {
      border-color: var(--blood);
      background: #220000;
      transform: scale(1.05);
    }
    
    .media-attach-trigger:hover svg {
      fill: var(--blood);
    }

    /* Active loaded verification states */
    .media-attach-trigger.attached {
      border-color: #55ff55;
      background: rgba(85, 255, 85, 0.1);
      color: #55ff55;
      font-size: 1.1rem;
      font-family: system-ui, sans-serif;
      font-weight: bold;
      text-shadow: 0 0 6px #55ff55;
    }

    .hidden-file-input {
      display: none !important;
    }

    .action-submit-btn {
      background: #220000;
      color: #ffbbbb;
      border: 2px solid var(--blood);
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'Creepster', sans-serif;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }
    .action-submit-btn:hover:not(:disabled) {
      background: var(--blood);
      color: #000;
      box-shadow: 0 0 20px #ff1a2e;
    }
    .action-submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* --- COMMENT TREES LAYER --- */
    .root-comment-thread-block {
      background: #0f0001;
      border-left: 3px solid #550000;
      margin-bottom: 20px;
      padding-left: 10px;
      border-radius: 0 8px 8px 0;
    }

    .comment {
      background: #140000;
      border: 1px solid #330000;
      padding: 14px;
      border-radius: 8px;
      margin-top: 8px;
    }
    .comment.author-highlight {
      border-color: var(--blood);
      box-shadow: inset 0 0 10px rgba(255, 26, 46, 0.15);
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .author-badge {
      background: var(--blood);
      color: #000;
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .replies-branch {
      margin-left: 30px;
      border-left: 2px dashed #330000;
      padding-left: 10px;
    }

    .reply-form-container {
      display: none;
      margin-top: 12px;
      padding: 10px;
      background: #080000;
      border: 1px dashed #550000;
      border-radius: 6px;
    }

    .thread-toggle-wrapper {
      margin: 10px 0 5px 30px;
    }
    .thread-toggle-btn {
      background: transparent;
      border: none;
      color: #ffaa55;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      font-size: 0.9rem;
      padding: 0;
    }
    .thread-toggle-btn:hover { text-decoration: underline; }

    .posting-loader {
      display: none;
      align-items: center;
      gap: 12px;
      color: #ff6666;
      margin-top: 10px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid #330000;
      border-top-color: var(--blood);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header class="app-header">
  <button class="nav-back-btn" onclick="goBack()">← BACK</button>
  <h1>THE ABYSS NODE</h1>
  <div></div>
</header>

<div class="container">
  
  <div id="mainPost" style="margin-bottom: 30px;">
    <p style="text-align:center; color:#555;">Connecting to core data node stream...</p>
  </div>

  <div class="box">
    <b>MANIFEST A REFLECTION IN THIS LAYER</b>
    <div class="input-container-wrapper">
      <textarea id="commentInput" placeholder="Drop your phrase payload into the echo chain..."></textarea>
      <input type="file" id="commentFile" class="hidden-file-input" accept="image/*,video/*" onchange="updateMediaIconState('', this)">
      <button class="media-attach-trigger" id="mediaTrigger-" title="Attach Media Image/Video" onclick="triggerNativeFileInput('')">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      </button>
    </div>
    
    <button id="commentBtn" class="action-submit-btn" onclick="addComment('', 'primary')">ECHO INTO VOID</button>
    
    <div id="postingLoader" class="posting-loader">
      <div class="spinner"></div>
      <span>Securing payload parameters...</span>
    </div>
  </div>

  <b>CORRESPONDING ECHO THREAD LAYERS</b>
  <div id="comments"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_rZQ0-PTcw2u--0AjybYOBtWnoh2XxDk",
  authDomain: "counter-ea7c8.firebaseapp.com",
  projectId: "counter-ea7c8",
  storageBucket: "counter-ea7c8.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);
const auth = getAuth(app);

const postId = new URLSearchParams(location.search).get("id");
if (!postId) {
  document.body.innerHTML = "<h2 style='color:red;text-align:center;margin-top:120px;'>No context reference target context found</h2>";
}

let currentUser = null;
let currentUsername = "Anonymous";
let parentPostOwnerId = ""; 

let commentsFlatList = [];
let expandedThreadsState = {}; 

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  currentUsername = localStorage.getItem("username") || "Anonymous";
  setupMainPostListener(); 
});

window.goBack = () => {
  if (document.referrer && document.referrer.includes(window.location.hostname)) {
    history.back();
  } else {
    location.href = "index.html";
  }
};

function getUsername() { return currentUsername; }

function showCommentLoader(show) {
  const loader = document.getElementById("postingLoader");
  const btn = document.getElementById("commentBtn");
  if (loader && btn) {
    loader.style.display = show ? "flex" : "none";
    btn.disabled = show;
  }
}

function parseFormattedDate(timestampMillis) {
  if (!timestampMillis) return "";
  const dateObj = new Date(timestampMillis);
  return dateObj.toLocaleString(undefined, {
    month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
  });
}

window.triggerNativeFileInput = (idSuffix) => {
  const targetInput = document.getElementById(`commentFile${idSuffix ? '-' + idSuffix : ''}`);
  if (targetInput) targetInput.click();
};

window.updateMediaIconState = (idSuffix, element) => {
  const triggerBtn = document.getElementById(`mediaTrigger-${idSuffix}`);
  if (!triggerBtn) return;
  if (element.files && element.files.length > 0) {
    triggerBtn.classList.add("attached");
    triggerBtn.innerHTML = "✓";
  } else {
    triggerBtn.classList.remove("attached");
    triggerBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>`;
  }
};

window.handlePostVote = async (voteType) => {
  if (!currentUser) return alert("Presence signature initialization missing.");
  try {
    const postRef = doc(db, "posts", postId);
    const postSnap = await getDoc(postRef);
    if (!postSnap.exists()) return;
    
    const data = postSnap.data();
    let votesMap = data.votesMap || {};
    let likesMap = data.likesMap || {};
    let dislikesMap = data.dislikesMap || {};
    const uid = currentUser.uid;

    if (voteType === 'like') {
      if (votesMap[uid]) delete votesMap[uid];
      if (likesMap[uid]) { 
        delete likesMap[uid]; 
      } else { 
        likesMap[uid] = true; 
        delete dislikesMap[uid]; 
      }
    } else {
      if (votesMap[uid]) delete votesMap[uid];
      if (dislikesMap[uid]) { 
        delete dislikesMap[uid]; 
      } else { 
        dislikesMap[uid] = true; 
        delete likesMap[uid]; 
      }
    }
    
    await updateDoc(postRef, { votesMap, likesMap, dislikesMap });
  } catch (err) { console.error(err); }
};

window.sharePost = () => {
  navigator.clipboard.writeText(window.location.href);
  alert("Abyss connection coordinates linked to clip matrix!");
};

window.downloadPostMedia = (url) => {
  if (!url) return alert("No media matrix discovered.");
  window.open(url, '_blank');
};

window.editPostContent = async () => {
  const newText = prompt("Mutate payload content sequence:");
  if (newText === null) return;
  try {
    await updateDoc(doc(db, "posts", postId), { content: newText });
  } catch (err) { alert("Mutation fault execution error."); }
};

window.erasePostEntirely = async () => {
  if (!confirm("Banish this main core node post entirely?")) return;
  try {
    await deleteDoc(doc(db, "posts", postId));
    location.href = "index.html";
  } catch (err) { alert("Purge system constraint violation."); }
};

function setupMainPostListener() {
  const postRef = doc(db, "posts", postId);
  
  onSnapshot(postRef, (postSnap) => {
    if (postSnap.exists()) {
      const p = postSnap.data();
      parentPostOwnerId = p.ownerId || ""; 
      
      let media = "";
      if (p.fileType?.startsWith("video")) {
        media = `<video src="${p.fileUrl}" controls></video>`;
      } else if (p.fileUrl) {
        media = `<img src="${p.fileUrl}">`;
      }

      const legacyLikes = Object.values(p.votesMap || {}).filter(v => v === 1).length;
      const currentNewLikes = Object.values(p.likesMap || {}).filter(v => v === true).length;
      const totalLikes = legacyLikes + currentNewLikes;
      
      const totalDislikes = Object.values(p.dislikesMap || {}).filter(v => v === true).length;
      const isOwner = currentUser && parentPostOwnerId === currentUser.uid;

      let managementMarkup = isOwner ? `
        <div class="author-controls">
          <button class="author-action-btn" onclick="editPostContent()">EDIT</button>
          <button class="author-action-btn delete-btn" onclick="erasePostEntirely()">ERASE</button>
        </div>
      ` : "";

      document.getElementById("mainPost").innerHTML = `
        <div class="main-post">
          <div class="post-header-wrapper">
            <div>
              <div class="username">${p.username || "Anonymous"}</div>
              <div class="timestamp-label">${parseFormattedDate(p.timestamp)}</div>
            </div>
            ${managementMarkup}
          </div>
          <div class="post-content">
            <p>${p.content || ""}</p>
            ${media}
          </div>
          <div class="comment-toolbar" style="margin-top:15px; border-top:1px solid #330000; padding-top:10px;">
            <div class="reactions-cluster">
              <button class="react-pill" onclick="handlePostVote('like')">👍 <span>${totalLikes}</span></button>
              <button class="react-pill" onclick="handlePostVote('dislike')">👎 <span>${totalDislikes}</span></button>
            </div>
            <div class="action-links">
              <span class="action-text-btn" onclick="sharePost()">🔗 SHARE</span>
              ${p.fileUrl ? `<span class="action-text-btn" onclick="downloadPostMedia('${p.fileUrl}')">💾 DOWNLOAD</span>` : ''}
            </div>
          </div>
        </div>
      `;
      
      window.renderCommentsTree();
    } else {
      document.getElementById("mainPost").innerHTML = `<p style="color:#aa0000; text-align:center;">Post missing.</p>`;
    }
  }, (err) => {
    console.error("Main post pipeline failure: ", err);
  });
}

window.addComment = async (parentId = "", executionContext = "primary") => {
  let text, fileInput, postButton;
  
  if (executionContext === 'primary') {
    text = document.getElementById("commentInput").value.trim();
    fileInput = document.getElementById("commentFile");
    showCommentLoader(true);
  } else {
    text = document.getElementById(`replyInput-${parentId}`).value.trim();
    fileInput = document.getElementById(`commentFile-${parentId}`);
    postButton = document.getElementById(`replyBtn-${parentId}`);
    if (postButton) postButton.disabled = true;
  }

  const file = fileInput ? fileInput.files[0] : null;
  let url = "";

  if (file) {
    try {
      const r = ref(storage, `comments/${Date.now()}_${file.name}`);
      await uploadBytes(r, file);
      url = await getDownloadURL(r);
    } catch (e) {
      alert("Storage upload error.");
      if (executionContext === 'primary') showCommentLoader(false);
      if (postButton) postButton.disabled = false;
      return;
    }
  }

  if (!text && !url) {
    alert("Comment structure cannot be blank.");
    if (executionContext === 'primary') showCommentLoader(false);
    if (postButton) postButton.disabled = false;
    return;
  }

  try {
    await addDoc(collection(db, "posts", postId, "comments"), {
      username: getUsername(),
      ownerId: currentUser ? currentUser.uid : "anon",
      text: text,
      image: url,
      parentId: parentId || null, 
      likesMap: {},
      dislikesMap: {},
      timestamp: Date.now()
    });

    if (executionContext === 'primary') {
      document.getElementById("commentInput").value = "";
      document.getElementById("commentFile").value = "";
      window.updateMediaIconState('', document.getElementById("commentFile"));
    } else {
      document.getElementById(`replyInput-${parentId}`).value = "";
      if (document.getElementById(`replyFile-${parentId}`)) {
        document.getElementById(`replyFile-${parentId}`).value = "";
      }
      const refFileInput = document.getElementById(`commentFile-${parentId}`);
      if (refFileInput) {
        refFileInput.value = "";
        window.updateMediaIconState(parentId, refFileInput);
      }
      window.toggleReplyForm(parentId);
    }
  } catch (e) {
    alert("Database connection sync dropped.");
    if (executionContext === 'primary') showCommentLoader(false);
    if (postButton) postButton.disabled = false;
  }
};

window.toggleReplyForm = (rootCommentId, targetUsername = null) => {
  const form = document.getElementById(`replyForm-${rootCommentId}`);
  const input = document.getElementById(`replyInput-${rootCommentId}`);
  
  if (!form || !input) return;

  if (form.style.display === "block" && !targetUsername) {
    form.style.display = "none";
  } else {
    form.style.display = "block";
    
    if (targetUsername) {
      const formattedMention = `@${targetUsername} `;
      if (!input.value.includes(formattedMention)) {
        input.value = formattedMention + input.value.replace(/^@\S+\s*/, "");
      }
    }
    input.focus();
  }
};

window.toggleThreadAccordian = (commentId, threadLength) => {
  const contentBlock = document.getElementById(`threadBlock-${commentId}`);
  const triggerBtn = document.getElementById(`threadToggleBtn-${commentId}`);
  
  if (!contentBlock) return;
  
  if (contentBlock.style.display === "block") {
    contentBlock.style.display = "none";
    expandedThreadsState[commentId] = false;
    triggerBtn.textContent = `▶ View ${threadLength} replies`;
  } else {
    contentBlock.style.display = "block";
    expandedThreadsState[commentId] = true;
    
    if (threadLength > 10) {
      triggerBtn.textContent = `▼ Showing first 10 replies (View ${threadLength - 10} more below)`;
    } else {
      triggerBtn.textContent = `▼ Hide replies`;
    }
  }
};

window.handleCommentVote = async (commentId, voteType) => {
  if (!currentUser) return alert("You must choose a presence signature profile first.");
  try {
    const commentDocRef = doc(db, "posts", postId, "comments", commentId);
    const targetSnapshot = commentsFlatList.find(d => d.id === commentId);
    if (!targetSnapshot) return;

    const data = targetSnapshot.data();
    let likesMap = data.likesMap || {};
    let dislikesMap = data.dislikesMap || {};
    const uid = currentUser.uid;

    if (voteType === 'like') {
      if (likesMap[uid]) { delete likesMap[uid]; } else { likesMap[uid] = true; delete dislikesMap[uid]; }
    } else {
      if (dislikesMap[uid]) { delete dislikesMap[uid]; } else { dislikesMap[uid] = true; delete likesMap[uid]; }
    }

    await updateDoc(commentDocRef, { likesMap, dislikesMap });
  } catch (err) {
    console.error("Mutation vector execution error: ", err);
  }
};

window.deleteComment = async (commentId) => {
  if (!confirm("Banish this record completely? All matching sub-threads drop out of scope layout view paths.")) return;
  try {
    await deleteDoc(doc(db, "posts", postId, "comments", commentId));
    const children = commentsFlatList.filter(d => d.data().parentId === commentId);
    for (const child of children) {
      await deleteDoc(doc(db, "posts", postId, "comments", child.id));
    }
  } catch (err) {
    alert("Authorization failure.");
  }
};

function compileSingleCommentHtml(docObj, isNestedReply = false, rootId = null) {
  const c = docObj.data();
  const id = docObj.id;
  
  let media = c.image ? `<img src="${c.image}">` : "";
  
  const targetLikesMap = c.likesMap || {};
  const targetDislikesMap = c.dislikesMap || {};
  
  const totalLikes = Object.values(targetLikesMap).filter(v => v === true).length;
  const totalDislikes = Object.values(targetDislikesMap).filter(v => v === true).length;

  const isCommentOwner = currentUser && c.ownerId === currentUser.uid;
  const isParentPostOwner = currentUser && parentPostOwnerId && parentPostOwnerId === currentUser.uid;
  
  let deleteBtnMarkup = (isCommentOwner || isParentPostOwner) 
    ? `<button class="delete-btn" onclick="deleteComment('${id}')">ERASE</button>` 
    : "";

  const isAuthorIdentity = parentPostOwnerId && c.ownerId === parentPostOwnerId;
  const authorBadge = isAuthorIdentity ? `<span class="author-badge">AUTHOR</span>` : "";
  const alignmentClass = isAuthorIdentity ? "author-highlight" : "";

  const clickId = isNestedReply ? rootId : id;
  const targetUserArgument = isNestedReply ? `'${c.username}'` : 'null';

  return `
    <div class="comment ${alignmentClass}" id="commentNode-${id}">
      <div class="comment-header">
        <div>
          <span class="username">${c.username || "Anonymous"}</span>${authorBadge}
          <div class="timestamp-label">${parseFormattedDate(c.timestamp)}</div>
        </div>
        ${deleteBtnMarkup}
      </div>
      <p>${c.text || ""}</p>
      ${media}
      
      <div class="comment-toolbar">
        <div class="reactions-cluster">
          <button class="react-pill" onclick="handleCommentVote('${id}', 'like')">👍 <span>${totalLikes}</span></button>
          <button class="react-pill" onclick="handleCommentVote('${id}', 'dislike')">👎 <span>${totalDislikes}</span></button>
        </div>
        <div class="action-links">
          <span class="action-text-btn" onclick="toggleReplyForm('${clickId}', ${targetUserArgument})">REPLY</span>
        </div>
      </div>

      ${!isNestedReply ? `
      <div class="reply-form-container" id="replyForm-${id}">
        <div class="input-container-wrapper">
          <textarea id="replyInput-${id}" placeholder="Reply to this thread level..."></textarea>
          <input type="file" id="commentFile-${id}" class="hidden-file-input" accept="image/*,video/*" onchange="updateMediaIconState('${id}', this)">
          <button class="media-attach-trigger" id="mediaTrigger-${id}" title="Attach Media Image/Video" onclick="triggerNativeFileInput('${id}')">
            <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
          </button>
        </div>
        <button id="replyBtn-${id}" class="action-submit-btn" onclick="addComment('${id}', 'reply')" style="padding:6px 12px; font-size:0.95rem; width:auto; margin-top:5px;">REPLY</button>
      </div>
      ` : ""}
    </div>
  `;
}

window.renderCommentsTree = () => {
  const container = document.getElementById("comments");
  container.innerHTML = "";

  if (commentsFlatList.length === 0) {
    container.innerHTML = `<div class="box" style="text-align:center; color:#aa0000; margin-top:20px;">No whispers left here yet...</div>`;
    return;
  }

  const rootComments = commentsFlatList.filter(d => !d.data().parentId);
  const repliesPool = commentsFlatList.filter(d => d.data().parentId);

  rootComments.forEach(rootDoc => {
    let threadHtml = `<div class="root-comment-thread-block">`;
    threadHtml += compileSingleCommentHtml(rootDoc, false);

    const directReplies = repliesPool.filter(r => r.data().parentId === rootDoc.id);

    if (directReplies.length > 0) {
      const authorReplies = directReplies.filter(r => parentPostOwnerId && r.data().ownerId === parentPostOwnerId);
      const regularReplies = directReplies.filter(r => !parentPostOwnerId || r.data().ownerId !== parentPostOwnerId);

      authorReplies.forEach(authReply => {
        threadHtml += `<div class="replies-branch">${compileSingleCommentHtml(authReply, true, rootDoc.id)}</div>`;
      });

      if (regularReplies.length > 0) {
        const totalRegularCount = regularReplies.length;
        const isCurrentlyExpanded = expandedThreadsState[rootDoc.id] || false;
        
        const blockStyle = isCurrentlyExpanded ? "display: block;" : "display: none;";
        const initialText = isCurrentlyExpanded 
          ? (totalRegularCount > 10 ? `▼ Showing first 10 replies (View ${totalRegularCount - 10} more below)` : `▼ Hide replies`)
          : `▶ View ${totalRegularCount} replies`;

        threadHtml += `
          <div class="thread-toggle-wrapper">
            <button id="threadToggleBtn-${rootDoc.id}" class="thread-toggle-btn" onclick="toggleThreadAccordian('${rootDoc.id}', ${totalRegularCount})">
              ${initialText}
            </button>
          </div>
          <div id="threadBlock-${rootDoc.id}" class="thread-content-block" style="${blockStyle}">
        `;

        regularReplies.forEach((fanReply, index) => {
          if (index === 10) {
            threadHtml += `
              <div id="extendedCutoffBlock-${rootDoc.id}" class="extended-cutoff-notice" style="padding:10px 0 10px 25px; color:#ffaa55; font-family:system-ui,sans-serif; font-size:0.9rem;">
                📊 View ${totalRegularCount - 10} more replies below...
              </div>
            `;
          }
          threadHtml += `<div class="replies-branch">${compileSingleCommentHtml(fanReply, true, rootDoc.id)}</div>`;
        });

        threadHtml += `</div>`; 
      }
    }

    threadHtml += `</div>`; 
    container.innerHTML += threadHtml;
  });
};

const commentsRef = collection(db, "posts", postId, "comments");
const chronologicalCommentsQuery = query(commentsRef, orderBy("timestamp", "asc"));

onSnapshot(chronologicalCommentsQuery, (snap) => {
  commentsFlatList = snap.docs;
  window.renderCommentsTree();
  showCommentLoader(false);
}, (err) => {
  console.error("Pipeline failure: ", err);
});
</script>
</body>
</html>
