<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tanishq Abyss 💀</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nosifer&family=Creepster&display=swap');

    :root {
      --blood: #ff1a2e;
      --deepred: #a00;
      --void: #0a0000;
    }

    body {
      background: var(--void);
      color: #eee;
      font-family: 'Creepster', system-ui, sans-serif;
      margin: 0;
      padding: 15px;
      line-height: 1.5;
    }

    h1 {
      text-align: center;
      font-family: 'Nosifer', cursive;
      font-size: 3.6rem;
      color: var(--blood);
      text-shadow: 3px 3px 0 #000, -3px -3px 0 #000;
      letter-spacing: 8px;
      margin: 20px 0 35px;
      text-transform: uppercase;
      line-height: 1.05;
    }

    .box {
      background: #140000;
      border: 3px solid var(--deepred);
      padding: 22px;
      margin-bottom: 25px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(255, 26, 46, 0.3);
    }

    input, textarea {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      background: #000;
      color: #ff8888;
      border: 2px solid #660000;
      border-radius: 8px;
      font-family: 'Creepster', sans-serif;
      font-size: 1.1rem;
      box-sizing: border-box;
    }

    textarea { 
      min-height: 130px; 
      resize: vertical; 
      word-break: break-word; 
    }

    button {
      padding: 12px 18px;
      background: #220000;
      color: #ffbbbb;
      border: 2px solid var(--blood);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Creepster', sans-serif;
      font-size: 1.05rem;
      margin: 6px 6px 6px 0;
      transition: all 0.3s;
    }

    button:hover:not(:disabled) {
      background: var(--blood);
      color: #000;
      box-shadow: 0 0 20px #ff1a2e;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .row { display: flex; flex-wrap: wrap; gap: 12px; }

    #currentUser {
      margin-top: 18px;
      padding: 14px;
      background: rgba(30,0,0,0.8);
      border: 2px dashed #880000;
      color: #ff6666;
      font-size: 1.15rem;
      text-align: center;
      font-family: 'Creepster', sans-serif;
    }

    .post {
      background: #110000;
      border: 2px solid #550000;
      padding: 18px;
      margin-bottom: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(160, 0, 0, 0.5);
      overflow: hidden;
    }

    .username {
      color: #ff5555;
      font-size: 1.35rem;
      cursor: pointer;
      text-shadow: 0 0 8px var(--blood);
    }

    img, video {
      max-width: 100%;
      margin: 12px 0 15px;
      border-radius: 8px;
      border: 2px solid #660000;
      display: block;
    }

    .post p {
      word-break: break-word;
      overflow-wrap: break-word;
      margin: 12px 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 15px;
      align-items: center;
    }

    .vote button {
      padding: 4px 11px;
      font-size: 1.25rem;
      min-width: 34px;
    }

    .comment-count {
      color: #ff8888;
      font-size: 1.15rem;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .delete { background: #400000; color: #ffaaaa; }

    /* Posting Loader */
    .posting-loader {
      display: none;
      align-items: center;
      gap: 12px;
      color: #ff6666;
      font-size: 1.1rem;
      margin-top: 10px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 4px solid #440000;
      border-top: 4px solid #ff1a2e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading {
      text-align: center;
      color: #aa0000;
      font-size: 1.4rem;
      padding: 60px 20px;
    }
  </style>
</head>
<body>

<h1>TANISHQ ABYSS</h1>

<div class="box">
  <b>ENTER THE COMMUNITY</b>
  <input id="username" placeholder="YOUR NAME (OPTIONAL FOR LOGIN)">
  <input id="password" type="password" placeholder="PASSWORD">

  <div class="row">
    <button onclick="signup()">SIGN UP</button>
    <button onclick="login()">LOGIN</button>
    <button onclick="anon()">GO ANONYMOUS</button>
    <button onclick="logout()">LOGOUT</button>
  </div>

  <div id="currentUser">YOU ARE CURRENTLY: <span id="userDisplay" style="color:#ff4444;">ANONYMOUS</span></div>
</div>

<div class="box">
  <b>POST SOMETHING</b>
  <textarea id="postInput" placeholder="What lurks in your mind..."></textarea>
  <input type="file" id="fileInput" accept="image/*,video/*">
  <button id="postBtn" onclick="createPost()">POST TO THE ABYSS</button>
  
  <div id="postingLoader" class="posting-loader">
    <div class="spinner"></div>
    <span>Bleeding into the void...</span>
  </div>
</div>

<div id="feed">
  <div class="loading">Loading screams from the abyss...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, collection, addDoc, doc, updateDoc, getDoc, deleteDoc, 
  onSnapshot, query, orderBy, limit, getCountFromServer 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_rZQ0-PTcw2u--0AjybYOBtWnoh2XxDk",
  authDomain: "counter-ea7c8.firebaseapp.com",
  projectId: "counter-ea7c8",
  storageBucket: "counter-ea7c8.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);
const auth = getAuth(app);

let currentUser = null;
let currentUsername = "Anonymous";

const emailFromUser = (u) => (u || "anon").trim().toLowerCase() + "@tanishq.app";

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  currentUsername = localStorage.getItem("username") || "Anonymous";
  document.getElementById("userDisplay").textContent = currentUsername.toUpperCase();
});

function getUsername() { return currentUsername; }

// Loader control
function showPostingLoader(show) {
  const loader = document.getElementById("postingLoader");
  const btn = document.getElementById("postBtn");
  if (show) {
    loader.style.display = "flex";
    btn.disabled = true;
  } else {
    loader.style.display = "none";
    btn.disabled = false;
  }
}

// ==================== AUTH ====================
window.signup = async () => {
  const name = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value;
  if (!name || !pass) return alert("Name and password required");
  try {
    await createUserWithEmailAndPassword(auth, emailFromUser(name), pass);
    localStorage.setItem("username", name);
    currentUsername = name;
    document.getElementById("userDisplay").textContent = name.toUpperCase();
    alert("Welcome to Tanishq Abyss...");
  } catch (e) { alert(e.message); }
};

window.login = async () => {
  const name = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value;
  if (!name || !pass) return alert("Name and password required");
  try {
    await signInWithEmailAndPassword(auth, emailFromUser(name), pass);
    localStorage.setItem("username", name);
    currentUsername = name;
    document.getElementById("userDisplay").textContent = name.toUpperCase();
  } catch (e) { alert(e.message); }
};

window.anon = async () => {
  try {
    await signInAnonymously(auth);
    localStorage.setItem("username", "Anonymous");
    currentUsername = "Anonymous";
    document.getElementById("userDisplay").textContent = "ANONYMOUS";
  } catch (e) { alert(e.message); }
};

window.logout = async () => {
  await signOut(auth);
  currentUsername = "Anonymous";
  document.getElementById("userDisplay").textContent = "ANONYMOUS";
};

// ==================== CREATE POST WITH LOADING ====================
window.createPost = async () => {
  if (!currentUser) return alert("The abyss requires a presence...");

  const content = document.getElementById("postInput").value.trim();
  const file = document.getElementById("fileInput").files[0];

  let fileUrl = "", fileType = "";

  showPostingLoader(true);   // Disable button + show loader

  // Upload file if any
  if (file) {
    try {
      const storageRef = ref(storage, `posts/${Date.now()}_${file.name}`);
      await uploadBytes(storageRef, file);
      fileUrl = await getDownloadURL(storageRef);
      fileType = file.type;
    } catch (e) {
      alert("File upload failed.");
      showPostingLoader(false);
      return;
    }
  }

  if (!content && !fileUrl) {
    alert("Post something...");
    showPostingLoader(false);
    return;
  }

  try {
    await addDoc(collection(db, "posts"), {
      content,
      fileUrl,
      fileType,
      username: getUsername(),
      ownerId: currentUser.uid,
      votesMap: {},
      timestamp: Date.now()
    });

    // Clear form immediately
    document.getElementById("postInput").value = "";
    document.getElementById("fileInput").value = "";

    // Loader will be hidden automatically by the onSnapshot below when the post appears

  } catch (e) {
    alert("Failed to post into the darkness.");
    showPostingLoader(false);
  }
};

// ==================== REAL-TIME FEED ====================
onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc"), limit(20)), async (snap) => {
  const feed = document.getElementById("feed");
  let html = "";

  if (snap.empty) {
    html = `<div class="box" style="text-align:center; color:#aa0000;">No posts yet...</div>`;
  } else {
    for (const docSnap of snap.docs) {
      const p = docSnap.data();
      const postId = docSnap.id;
      const votes = Object.values(p.votesMap || {}).reduce((a, b) => a + b, 0);

      let commentCount = 0;
      try {
        const countSnap = await getCountFromServer(collection(db, "posts", postId, "comments"));
        commentCount = countSnap.data().count;
      } catch (e) {}

      let media = p.fileType?.startsWith("video") 
        ? `<video src="${p.fileUrl}" controls></video>` 
        : p.fileUrl ? `<img src="${p.fileUrl}">` : "";

      const isOwner = currentUser && p.ownerId === currentUser.uid;
      const delBtn = isOwner ? `<button class="delete" onclick="deletePost('${postId}')">ERASE</button>` : "";

      html += `
        <div class="post">
          <div class="username" onclick="openProfile('${p.ownerId}')">${p.username}</div>
          <p>${p.content || ""}</p>
          ${media}
          <div class="actions">
            <div class="vote">
              <button onclick="vote('${postId}', 1)">👍</button>
              <span>${votes}</span>
              <button onclick="vote('${postId}', -1)">👎</button>
            </div>
            <div class="comment-count" onclick="openPost('${postId}')">💬 ${commentCount}</div>
            ${delBtn}
          </div>
        </div>
      `;
    }
  }

  feed.innerHTML = html;
  showPostingLoader(false);   // Hide loader + re-enable button when post appears
});

// Other functions
window.vote = async (id, val) => {
  if (!currentUser) return alert("Login or go anonymous to vote");
  try {
    const postRef = doc(db, "posts", id);
    const data = (await getDoc(postRef)).data();
    const map = data.votesMap || {};
    map[currentUser.uid] = val;
    await updateDoc(postRef, { votesMap: map });
  } catch (e) {}
};

window.deletePost = async (id) => {
  if (!confirm("Erase this forever?")) return;
  try { await deleteDoc(doc(db, "posts", id)); } catch (e) {}
};

window.openPost = (id) => location.href = `post.html?id=${id}`;
window.openProfile = (uid) => location.href = `profile.html?uid=${uid}`;
</script>
</body>
</html>
